<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Edit Institution</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-warning">

<h3>Edit Institution</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">Institution Name</label>

<input
type="text"
name="name"
class="form-control"
value="{{ institution[1] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">City</label>

<input
type="text"
name="city"
class="form-control"
value="{{ institution[2] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">Type</label>

<select
name="type"
class="form-select">

<option value="School"
{% if institution[3]=="School" %}selected{% endif %}>
School
</option>

<option value="College"
{% if institution[3]=="College" %}selected{% endif %}>
College
</option>

</select>

</div>

<button class="btn btn-warning w-100">

Update Institution

</button>

</form>

<hr>

<a href="/view" class="btn btn-secondary w-100">

Back to View

</a>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
